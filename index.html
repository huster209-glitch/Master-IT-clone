<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="promo">
        <div class="container">
            <div class="promo__block">
                <div class="promo__item">
                    <div class="promo__item_img">
                        <img src="images/Back on track.jpg" alt="">
                    </div>
                    <div class="promo__item_box">
                        <div class="promo__item_play"><img src="icons/play-solid.svg" alt=""></div>
                        <div class="promo__item_name">Back On Track</div>
                        <audio src="audios/BackOnTrack.mp3"></audio>
                    </div>
                    <div class="promo__item_icons">
                        <img src="icons/star-regular.svg" alt="">
                        <img src="icons/download-solid.svg" alt="">
                    </div>
                    <div class="promo__item_progress">
                        <div class="promo__item_progress_item"></div>
                    </div>
                </div>
                <div class="promo__item">
                    <div class="promo__item_img">
                        <img src="images/Deadlocked.jpg" alt="">
                    </div>
                    <div class="promo__item_box">
                        <div class="promo__item_play"><img src="icons/play-solid.svg" alt=""></div>
                        <div class="promo__item_name">Deadlocked</div>
                        <audio src="audios/Deadlocked.mp3"></audio>
                    </div>
                    <div class="promo__item_icons">
                        <img src="icons/star-regular.svg" alt="">
                        <img src="icons/download-solid.svg" alt="">
                    </div>
                    <div class="promo__item_progress">
                        <div class="promo__item_progress_item"></div>
                    </div>
                </div>
                <div class="promo__item">
                    <div class="promo__item_img">
                        <img src="images/Running Up That Hill.jpg" alt="">
                    </div>
                    <div class="promo__item_box">
                        <div class="promo__item_play"><img src="icons/play-solid.svg" alt=""></div>
                        <div class="promo__item_name">Running Up That Hill</div>
                        <audio src="audios/Running Up That Hill.mp3"></audio>
                    </div>
                    <div class="promo__item_icons">
                        <img src="icons/star-regular.svg" alt="">
                        <img src="icons/download-solid.svg" alt="">
                    </div>
                    <div class="promo__item_progress">
                        <div class="promo__item_progress_item"></div>
                    </div>
                </div>
                <div class="promo__item">
                    <div class="promo__item_img">
                        <img src="images/Unity.jpg" alt="">
                    </div>
                    <div class="promo__item_box">
                        <div class="promo__item_play"><img src="icons/play-solid.svg" alt=""></div>
                        <div class="promo__item_name">Unity</div>
                        <audio src="audios/Unity - TheFatRat.mp3"></audio>
                    </div>
                    <div class="promo__item_icons">
                        <img src="icons/star-regular.svg" alt="">
                        <img src="icons/download-solid.svg" alt="">
                    </div>
                    <div class="promo__item_progress">
                        <div class="promo__item_progress_item"></div>
                    </div>
                </div>
            </div>
            <div class="promo__player">
                <div class="promo__player_block">
                    <div class="promo__player_img">
                        <img src="images/Back on track.jpg" alt="">
                    </div>
                    <div id="title" class="promo_title">Back On Track</div>
                    <div class="promo__player_info">
                        <img class="backward_play" src="icons/backward-solid.svg" alt="">
                        <img class="active_play" src="icons/play-circle-solid.svg" alt="">
                        <img class="forward_play" src="icons/forward-solid.svg" alt="">
                    </div>

                    <div class="promo__player_progress">
                        <div class="promo__player_progress_item"></div>
                    </div>
                    <audio class="active_music" src="audios/BackOnTrack.mp3"></audio>
                </div>
            </div>
        </div>
    </section>
    <script src="app.js">
        
    </script>
</body>
</html>
